  });

  function bindAccordions(container) {
    container.querySelectorAll('.ipg-q-header').forEach(header => {
      header.addEventListener('click', () => {
        const q = header.closest('.ipg-q');
        const open = q.classList.contains('open');
        container.querySelectorAll('.ipg-q').forEach(el => el.classList.remove('open'));
        if (!open) q.classList.add('open');
      });
    });
  }

  function buildQ(num, question, guidance) {
    return `<div class="ipg-q">
      <div class="ipg-q-header">
        <div class="ipg-q-num">${num}</div>
        <div class="ipg-q-text">${question}</div>
        <svg class="ipg-q-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="ipg-q-body">
        <div class="ipg-q-guidance-label">How to answer</div>
        <div class="ipg-q-guidance">${guidance}</div>
      </div>
    </div>`;
  }

  function buildChecklist(items) {
    return items.map(item => `<div class="ipg-check-item">
      <div class="ipg-check-box"></div>
      <div class="ipg-check-text">${item}</div>
    </div>`).join('');
  }

  function buildRedflags(items) {
    return items.map(item => `<div class="ipg-redflag">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e53e3e" stroke-width="2.5" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div class="ipg-redflag-text">${item}</div>
    </div>`).join('');
  }

  function initChecklist() {
    document.querySelectorAll('.ipg-check-box').forEach(box => {
      box.addEventListener('click', () => {
        box.classList.toggle('checked');
        box.nextElementSibling.classList.toggle('done');
      });
    });
  }

  $('ipg-submit').addEventListener('click', () => {
    const role = $('ipg-role').value;
    const level = $('ipg-level').value;
    const company = $('ipg-company').value.trim();
    const skills = $('ipg-skills').value.trim();
    $('ipg-error').style.display = 'none';

    if (!role || !level) {
      $('ipg-error').style.display = 'block';
      return;
    }

    const data = IPG_DATA[role];
    if (!data) {
      $('ipg-error').textContent = 'Role data not found. Please select a different role.';
      $('ipg-error').style.display = 'block';
      return;
    }

    // Level-specific layer that blends into every role so the output reflects seniority
    const levelData = LEVEL_DATA[level] || { behavioral: [], ask: [], checklist: [], redflags: [], techNote: '' };

    // Header
    $('ipg-results-title').textContent = role + ' — ' + level;
    let meta = '';
    if (company) meta += 'Targeting: <strong>' + escapeHtml(company) + '</strong>';
    if (skills) meta += (meta ? ' &nbsp;·&nbsp; ' : '') + 'Skills: ' + escapeHtml(skills);
    $('ipg-results-meta').innerHTML = meta;

    // Company research CTA (shown whenever a target company is entered)
    const cta = $('ipg-company-cta');
    if (company) {
      cta.innerHTML = `<a class="ipg-cta-link" href="https://clover-path.com/company-research-hub" target="_blank" rel="noopener">
        <div class="ipg-cta-text">
          <div class="ipg-cta-title">Research your target company</div>
          <div class="ipg-cta-sub">Get the ins and outs of ${escapeHtml(company)}: culture, values, recent news, and the talking points that help you stand out.</div>
        </div>
        <span class="ipg-cta-btn">Open Research Hub<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-left:2px"><path d="M5 12h14M12 5l7 7-7 7"/></svg></span>
      </a>`;
      cta.classList.remove('ipg-hidden');
    } else {
      cta.innerHTML = '';
      cta.classList.add('ipg-hidden');
    }

    // Behavioral — level-specific questions first, then role-specific
    const behavioral = levelData.behavioral.concat(data.behavioral);
    const bList = $('list-behavioral');
    bList.innerHTML = behavioral.map((item, i) => buildQ(i+1, item.q, item.g)).join('');
    bindAccordions(bList);

    // Technical — role-specific, with a level depth note on top
    const tList = $('list-technical');
    let techHtml = '';
    if (levelData.techNote) techHtml += `<div class="ipg-skills-note"><strong>Level focus:</strong> ${levelData.techNote}</div>`;
    techHtml += data.technical.map((item, i) => buildQ(i+1, item.q, item.g)).join('');
    tList.innerHTML = techHtml;
    bindAccordions(tList);

    // Ask — level-specific questions first, then role-specific
    const ask = levelData.ask.concat(data.ask);
    const aList = $('list-ask');
    aList.innerHTML = ask.map((item, i) => buildQ(i+1, item.q, item.g)).join('');
    bindAccordions(aList);

    // Checklist — level/company/skills notes, then level-specific items, then role items
    const checkItems = levelData.checklist.concat(data.checklist);
    let checkHtml = '';
    const levelNote = LEVEL_CONTEXT[level];
    if (levelNote) checkHtml += `<div class="ipg-skills-note"><strong>Level note:</strong> ${levelNote}</div>`;
    const compNote = getCompanyNote(company);
    if (compNote) checkHtml += `<div class="ipg-skills-note"><strong>Company context:</strong> ${compNote}</div>`;
    if (skills) checkHtml += `<div class="ipg-skills-note"><strong>Your skills (${escapeHtml(skills)}):</strong> Prepare a specific, quantified example for each skill. The best skill stories follow: what the task was, how you applied the skill, and what measurably improved as a result.</div>`;
    checkHtml += buildChecklist(checkItems);
    $('list-checklist').innerHTML = checkHtml;
    initChecklist();

    // Red flags — role-specific, then level-specific
    const redflags = data.redflags.concat(levelData.redflags);
    $('list-redflags').innerHTML = buildRedflags(redflags);

    // Keep the tab count badges accurate for what is actually rendered
    setCount('behavioral', behavioral.length);
    setCount('technical', data.technical.length);
    setCount('ask', ask.length);
    setCount('checklist', checkItems.length);
    setCount('redflags', redflags.length);

    // Show results
    $('ipg-results').classList.remove('ipg-hidden');
    document.querySelectorAll('.ipg-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.ipg-panel').forEach(p => p.classList.remove('active'));
    document.querySelector('[data-tab="behavioral"]').classList.add('active');
    $('panel-behavioral').classList.add('active');
    setTimeout(() => $('ipg-results').scrollIntoView({behavior:'smooth',block:'start'}), 100);
  });

  $('ipg-reset').addEventListener('click', () => {
    $('ipg-role').value = '';
    $('ipg-level').value = '';
    $('ipg-company').value = '';
    $('ipg-skills').value = '';
    $('ipg-company-cta').innerHTML = '';
    $('ipg-company-cta').classList.add('ipg-hidden');
    $('ipg-results').classList.add('ipg-hidden');
    window.scrollTo({top:0,behavior:'smooth'});
  });
})();

// Height reporting for Webflow iframe embed
(function() {
  function reportHeight() {
    var h = document.documentElement.scrollHeight;
    window.parent.postMessage({ type: 'ipg-resize', height: h }, '*');
  }
  reportHeight();
  if (window.ResizeObserver) {
    new ResizeObserver(reportHeight).observe(document.body);
  }
  window.addEventListener('load', reportHeight);
})();
</script>
</body>
</html>
