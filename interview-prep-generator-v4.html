esolution, representations and warranties, and provisions that are missing. Read for your client specific risk profile."},{"q":"Explain attorney-client privilege and work product doctrine. How do you protect them in practice?","g":"Attorney-client privilege protects confidential communications for the purpose of seeking or providing legal advice. Work product protects documents prepared in anticipation of litigation. Practical protection: avoid copying unnecessary parties on legal advice, mark privileged documents, be careful with in-house communications mixing business and legal advice."},{"q":"How do you approach legal risk assessment for a business transaction?","g":"Cover: identify legal issues relevant to the deal, assess likelihood and magnitude of each risk, identify mitigation options, advise the client on residual risk, and document advice given. Connect legal analysis to business decision-making."}],"ask":[{"q":"What does the client relationship model look like here — do associates have direct client contact or work primarily through partners?","g":"Direct client contact accelerates development enormously. Understanding the model tells you how quickly you will build client relationship skills."},{"q":"How does the firm approach associate mentorship and professional development?","g":"Formal programs with assigned partners, structured feedback, and clear expectations produce better lawyers faster. Get specifics."},{"q":"What is the billing expectation, and how are pro bono hours treated?","g":"Billing requirements and pro bono policy tell you about firm culture and work-life balance. Understand what counts toward billing requirements."},{"q":"What are the biggest matters or transactions the group is currently working on?","g":"Reveals real work and deal flow. Shows you are interested in the substance of the practice, not just the firm name."}],"checklist":["Prepare a matter walkthrough showing your legal analysis, strategy, and client communication — know the key facts cold","Research the firm recent significant matters, laterals, or practice area developments","Prepare your why this firm and practice group specifically answer with concrete knowledge of their work","Review foundational concepts for your practice area — be ready for technical depth questions","Prepare your answer to a hypothetical ethical dilemma — these come up frequently","Know your bar admission status, pending applications, and any multi-jurisdiction experience clearly"],"redflags":["Inability to walk through a legal analysis process — I would research it is not sufficient","Speaking negatively about former clients or matters — violates confidentiality and signals poor judgment","No knowledge of the firm actual practice or recent work — shows you are applying broadly, not specifically","Vague answers about how you handle competing deadlines — this is a fundamental law practice skill"]},
"Compliance Officer":{"behavioral":[{"q":"Tell me about a compliance gap or risk you identified through a review or audit. What did you do?","g":"Walk through your identification process, how you assessed severity and root cause, how you escalated it, what remediation you designed and implemented, and how you verified it was resolved."},{"q":"Describe how you have built a culture of compliance in an organization that was initially resistant.","g":"Show a phased approach: understand the resistance, build relationships with business leaders, translate compliance requirements into business language, make compliance easy through process design, train in context, and recognize early wins."},{"q":"Tell me about a time you had to say no to a business initiative for compliance reasons. How did you handle it?","g":"Show you explained the specific risk clearly, proposed an alternative structure that achieved the business objective while managing the risk, and maintained the relationship."},{"q":"Give me an example of how you responded to a regulatory inquiry or examination. What was your role?","g":"Show how you organized the response team, managed document production, prepared business line staff, coordinated with outside counsel, communicated with the examiner, and addressed any findings."}],"technical":[{"q":"Walk me through how you would design and implement a compliance monitoring and testing program.","g":"Cover: risk assessment to prioritize activities, designing control tests that actually test whether controls work, setting frequency based on risk, documenting findings with root cause analysis, escalating significant issues, tracking remediation, and reporting to governance on program effectiveness."},{"q":"How do you stay current with regulatory changes and translate them into actionable requirements for the business?","g":"Show a systematic approach: monitor regulatory agency websites, subscribe to regulatory news services, participate in industry associations, engage outside counsel for significant developments, and have an internal regulatory change management process."},{"q":"What is the difference between a compliance risk assessment and a control effectiveness assessment?","g":"Risk assessment: identifies and prioritizes compliance risks based on inherent risk and control environment quality. Control effectiveness assessment: tests whether specific controls actually work as designed. Risk assessment tells you where to focus; control testing tells you if your controls are working."},{"q":"How do you approach policy development and maintenance?","g":"Cover: identify the regulatory requirement, draft in plain language for the intended audience, get input from business lines, align with senior management and legal, implement with targeted training, set a review cycle, and maintain a policy inventory with ownership and review dates."}],"ask":[{"q":"What regulatory framework and compliance programs are most significant for this organization right now?","g":"Reveals the actual compliance focus and where you would spend your time. Whether it is BSA/AML, GDPR, HIPAA, SOX, or industry-specific regulations tells you about the technical knowledge you will develop."},{"q":"How is the compliance function structured — centralized or embedded in business lines?","g":"Centralized compliance provides depth and independence; embedded compliance builds business relationships but can create capture risk."},{"q":"What is the relationship between compliance, legal, and internal audit here — how do they coordinate?","g":"Clear swim lanes and strong coordination produce a better risk management program. Conflict or duplication creates blind spots."},{"q":"What are the biggest compliance challenges the organization is navigating right now?","g":"Shows strategic curiosity. Their honest answer reveals what you would be working on and whether the compliance program is proactive or reactive."}],"checklist":["Research the regulatory framework most relevant to this industry and recent enforcement trends","Prepare a compliance gap or risk finding story with specific remediation steps and outcome","Review your compliance monitoring and testing methodology and be ready to describe it specifically","Prepare your answer to how do you balance business objectives with compliance requirements with a real example","Research any recent enforcement actions against the company or industry peers — show regulatory awareness","Prepare your answer to what compliance frameworks or certifications are you familiar with honestly"],"redflags":["Describing compliance as primarily enforcement and documentation without culture-building examples","Inability to explain the difference between policy compliance and risk management","No examples of business partnership or finding solutions rather than just blocking initiatives","Vague regulatory knowledge without naming specific rules, recent enforcement, or current priorities"]},
"Laboratory Technician":{"behavioral":[{"q":"Tell me about a time you identified an anomalous result in your analysis. How did you investigate it?","g":"Walk through your process: confirmed it was not a transcription error, checked calibration and controls, re-ran the sample, checked for matrix interference, consulted with a senior scientist. Treat unexpected results as information, not inconveniences."},{"q":"Describe a time you had to prioritize multiple urgent sample requests simultaneously. How did you manage it?","g":"Show how you assessed urgency, communicated your prioritization to stakeholders, and maintained quality throughout. Show you triage systematically rather than just going faster."},{"q":"Tell me about a time you noticed a safety issue in the lab. What did you do?","g":"Walk through what you observed, who you notified, and what the resolution was. Show you understand the hierarchy of controls and that safety concerns are never ignored for workflow."},{"q":"Give me an example of a time you had to master a new technique or instrument quickly.","g":"Show your learning approach: reviewed SOPs and literature, got training from an experienced colleague, practiced with low-stakes samples first, validated against known controls before running client samples."}],"technical":[{"q":"Walk me through your standard approach to preparing a sample for analysis.","g":"Cover the full workflow specific to your methods: receipt and login, condition assessment, homogenization or digestion if needed, appropriate dilutions, QC sample preparation, chain of custody maintenance, and instrument analysis sequence."},{"q":"What does a full QC set look like for a quantitative assay, and why does each element matter?","g":"Cover: method blank, calibration standards, calibration verification, matrix spike, matrix spike duplicate, field duplicate, and continuing calibration verification. Each element tests a different failure mode — show you understand what each catches."},{"q":"How do you troubleshoot an instrument producing inconsistent results?","g":"Systematic approach: check last known good data to bound the problem, verify calibration standards are fresh, inspect consumables, run a diagnostic, clean detector if appropriate, check carrier gas or mobile phase, compare to previous maintenance records."},{"q":"What is the difference between accuracy and precision in analytical measurement?","g":"Accuracy: how close a measurement is to the true value, measured by spike recovery. Precision: how reproducible a measurement is across replicates, measured by relative percent difference. You can be precise but inaccurate (systematic bias) or accurate but imprecise (random error). Both matter and require different corrective actions."}],"ask":[{"q":"What instruments and methods is the lab running most frequently? Are there any the team is working to bring online?","g":"Reveals your daily work and where the growth opportunities are. New method development is an excellent way to build expertise."},{"q":"What does the lab QA/QC program look like — is it accredited, and what standards does it operate under?","g":"Accreditation such as ISO 17025, NELAP, CAP, or CLIA tells you about quality culture and regulatory environment."},{"q":"What is the training and mentorship structure for new lab staff?","g":"Lab skills are learned by doing with proper supervision. Understanding the training structure tells you how quickly you will develop."},{"q":"What is the typical turnaround time for routine analyses, and what does surge capacity look like?","g":"Reveals the pace and pressure of the work and how the lab manages peak volume periods."}],"checklist":["Review the specific instruments and analytical methods listed in the job description — be honest about your experience level","Prepare a QC troubleshooting scenario you have actually navigated — walk through your diagnostic process","Review accuracy vs. precision and the QC parameters used in your primary methods","Research the lab accreditation, primary markets, and test menu","Prepare your answer to what would you do if you suspected a sample was contaminated with a specific protocol","Review laboratory safety: chemical hygiene plan, SDS, PPE requirements, emergency procedures"],"redflags":["Inability to explain basic QC elements and what each one tests — this is table-stakes knowledge","Treating analytical results as final without discussing QC acceptance criteria and review process","No examples of troubleshooting — experienced technicians have all dealt with instrument problems","Vague answers about safety protocols — labs have specific hazards and safety is not optional"]},
"Environmental Scientist":{"behavioral":[{"q":"Tell me about an environmental assessment or investigation you led. What were the technical and logistical challenges?","g":"Walk through the full scope: site characterization, sampling strategy, field execution challenges, analytical methods, data quality review, and findings. Show you understand the regulatory context and how your findings connected to a decision or action."},{"q":"Describe a time you had to communicate complex environmental risk findings to a non-technical audience.","g":"Show how you translated technical data into plain language that drove a real decision. Visualizations, analogies, and framing risk relative to familiar benchmarks are effective approaches."},{"q":"Tell me about a time environmental findings significantly changed the direction of a project.","g":"Walk through what you found, how you communicated it, how the project team responded, and what the ultimate outcome was."},{"q":"Give me an example of a time you had to work within significant regulatory constraints on a project.","g":"Show you understand relevant frameworks such as NEPA, RCRA, CERCLA, Clean Water Act, how you identified applicable requirements early, how you engaged with the regulatory agency, and how you managed the permitting or approval process."}],"technical":[{"q":"Walk me through how you would design a groundwater monitoring network for a remediation site.","g":"Cover: conceptual site model development, receptor and pathway identification, monitoring well network design, sampling frequency, indicator parameters selection, statistical methods for trend analysis, and how the network would change as remediation progresses."},{"q":"What is the difference between risk assessment and risk management in an environmental context?","g":"Risk assessment: scientific process of characterizing human health or ecological risk. Risk management: decision-making process incorporating technical findings, regulatory requirements, community input, and cost. Scientists do assessment; managers use it to make decisions."},{"q":"How do you ensure data quality in environmental sampling, and what does a QAPP include?","g":"QAPP components: project objectives, sample collection procedures, analytical methods, QC sample requirements, chain of custody, data validation procedures, and data quality objectives. Quality is built into the plan before sampling begins."},{"q":"Explain the difference between contaminant fate and transport. Why does it matter for site assessment?","g":"Fate: what happens to a contaminant over time — degradation, volatilization, sorption. Transport: how it moves — advection, diffusion, dispersion. Understanding both determines where to look for contamination and whether natural attenuation is occurring."}],"ask":[{"q":"What types of projects and regulatory frameworks does the team work with most?","g":"Reveals the technical and regulatory depth you will develop. Different frameworks have very different processes, timelines, and stakeholder dynamics."},{"q":"How does the team handle field safety — what is the safety culture and what does incident reporting look like?","g":"Environmental fieldwork has real hazards. A strong safety culture is non-negotiable and their answer tells you about organizational values."},{"q":"What does career development look like here — is there support for professional registration such as PE or PG?","g":"Professional licensure is valuable in environmental consulting and government. Understanding exam support affects your long-term career trajectory."},{"q":"What are the biggest regulatory or technical challenges the team is navigating right now?","g":"PFAS, vapor intrusion, and climate-driven regulatory changes are live issues. Their answer reveals where technical complexity is and where you would develop expertise."}],"checklist":["Review key environmental regulations relevant to the role: RCRA, CERCLA, Clean Water Act, relevant state programs","Prepare a field project walkthrough: sampling design, QA/QC measures, data interpretation, regulatory outcome","Review groundwater flow basics and contaminant transport fundamentals — expect technical questions","Research the company project types and any recent notable environmental cases","Prepare your answer to what environmental issue do you think is most underappreciated right now thoughtfully","Review QAPP components and data quality objective frameworks if the role involves field work"],"redflags":["Inability to explain basic contaminant fate and transport — foundational to site assessment","No familiarity with QA/QC requirements in environmental sampling — data quality is a regulatory and legal issue","Vague answers about regulatory frameworks — environmental work is compliance-driven","No examples of communicating risk findings to non-scientists — environmental professionals must be translators"]},
"Journalist / Reporter":{"behavioral":[{"q":"Walk me through a story you broke or investigated from tip to publication. What obstacles did you face?","g":"Show the full journalism process: identifying the story, verifying initial information, finding and cultivating sources, gathering documentation, dealing with resistance, working through the editorial process, and measuring impact."},{"q":"Tell me about a time a source gave you information that turned out to be wrong. How did you handle it?","g":"Show your verification process, how you discovered the error, how you corrected it or did not publish it, and how you handled the source relationship afterward."},{"q":"Describe how you have cultivated a source relationship over time. What made it work?","g":"Source relationships are built on trust, consistency, and mutual value. Show you delivered on commitments, maintained contact when you did not need anything, and protected confidential information rigorously."},{"q":"Give me an example of a story where you felt uncomfortable pursuing it ethically. How did you navigate it?","g":"Show you recognized the conflict, consulted with editors or colleagues, applied ethical frameworks, and made a defensible decision."}],"technical":[{"q":"Walk me through your verification process for a piece of information from a single anonymous source.","g":"Single-source anonymous information should never publish without corroboration. Cover: seeking document evidence, finding additional sources who can confirm independently, triangulating through public records, on-the-record comment from the subject, and editorial consultation."},{"q":"How do you approach a FOIA or public records request strategically?","g":"Show you know which agencies hold which records, how to write a targeted request, how to appeal denials, and how to use records in combination with human sources."},{"q":"How do you structure a news story vs. a feature story? When does each serve the reader?","g":"News: inverted pyramid — most newsworthy information first, supports scanning. Feature: narrative structure — builds tension, uses scene-setting, benefits from more time. News serves breaking urgency; features serve depth and understanding."},{"q":"How do you find human sources for a story on a topic where the people most affected are hard to reach?","g":"Describe your sourcing strategy: advocacy organizations, community leaders, social media groups, court records, academic researchers, other journalists who have covered adjacent topics."}],"ask":[{"q":"What does editorial independence look like here — how are story ideas vetted and who has final say?","g":"Reveals whether reporters pitch freely and have protection from commercial or political interference. This goes to the heart of journalistic integrity."},{"q":"What does the beats system look like, and how much ownership do reporters have over their beat relationships?","g":"Beat ownership enables the source cultivation that produces the best reporting."},{"q":"How does the outlet handle corrections and factual disputes?","g":"Correction culture reveals accountability culture. Outlets that correct quickly and transparently are healthier."},{"q":"What are the biggest editorial challenges the newsroom is navigating right now?","g":"Honest conversation about audience, revenue, or trust challenges shows you understand the business of journalism, not just the craft."}],"checklist":["Prepare a story you are proudest of — walk through methodology, sources, and impact in 3 minutes","Read 10 recent pieces from the outlet and be ready to discuss voice, scope, and gaps","Prepare a story pitch specific to this outlet beat and audience — show editorial homework","Review your verification process and be ready to walk through a hypothetical scenario","Prepare your answer to what story do you most want to report with a specific, researched answer","Review any FOIA experience you have and be ready to walk through a records request"],"redflags":["Treating anonymous source information as publishable without corroboration — this is a hard disqualifier","No examples of investigative methodology or records use — suggests surface-level reporting","Inability to explain how you would handle a retraction or correction","Pitching story ideas with no specific angle, sources, or sense of the outlet audience"]},
"Public Relations":{"behavioral":[{"q":"Walk me through a PR campaign you planned from strategy through execution and measurement.","g":"Lead with the business or communications objective, then explain audience, messages, channels, tactics, and how you measured success. Be specific about results — message penetration and business outcomes matter more than coverage volume."},{"q":"Tell me about a crisis you managed. What happened, what did you do, and what was the outcome?","g":"Walk through: how you learned of the situation, your first hour of response, how you assessed the real risk, how you crafted messaging, who you coordinated with, and what happened afterward."},{"q":"Describe how you have built and maintained media relationships. What is your approach to keeping them warm?","g":"Show you pitch stories relevant to specific reporters, offer access and information even when you do not need coverage, and stay in touch consistently."},{"q":"Tell me about a time a pitch did not land and what you did differently.","g":"Analyze what went wrong: wrong reporter, wrong angle, wrong timing, weak hook. Explain what you changed and whether it produced a better result."}],"technical":[{"q":"How do you measure the ROI of a PR program?","g":"Move beyond AVE — it is discredited. Cover: earned media reach and sentiment analysis, share of voice, message penetration, website traffic spikes from earned coverage, and pipeline influenced where trackable."},{"q":"Walk me through how you would write a press release for a product launch.","g":"Cover: strong news-hook headline, lede answering who what when where why, body adding depth and quotes, boilerplate at end. The fatal error is writing a press release only the company finds interesting."},{"q":"How do you prepare an executive for a media interview?","g":"Media training process: define 3 key messages, prepare bridging techniques, practice likely hostile questions, work on body language and vocal presence, review the reporter past coverage, establish ground rules. Role-play is essential."},{"q":"What is your approach to pitching a story with limited or embargoed information?","g":"Show you understand embargo management: clear embargo terms in writing, follow up to confirm acceptance, contingency if embargo breaks early, provide enough information to generate interest without giving the full story."}],"ask":[{"q":"How integrated is the PR team with marketing, legal, and executive communications?","g":"Integrated communications produces consistent amplified messages. Siloed PR teams fight upstream constantly."},{"q":"What does the media relationship landscape look like — are there key reporters or outlets particularly important for this brand?","g":"A healthy media program has diverse relationships across beats and outlets, not dependence on one or two journalists."},{"q":"How does the organization handle reactive media inquiries — is there a defined process?","g":"Reactive protocol including who approves statements and what goes through legal tells you about organizational maturity."},{"q":"What are the biggest communications challenges the organization is navigating right now?","g":"Shows strategic curiosity and gives you context on what you would actually be managing."}],"checklist":["Research the company recent media coverage — know what has been said about them and by whom","Prepare a campaign case study with specific media results and business outcome connection","Have a crisis scenario response ready — you may be walked through a hypothetical","Review key reporters who cover this company industry — know their recent bylines","Prepare a pitch angle for something this company could realistically generate coverage on","Research the company social and executive communications presence to understand their current voice"],"redflags":["Measuring PR success only in press clippings without sentiment, message accuracy, or business connection","No examples of media relationship cultivation — relationships do not just happen from press releases","Vague answers about crisis response without a clear process or decision framework","Using advertising value equivalent as a primary PR metric — this signals outdated practice"]},
"Communications Manager":{"behavioral":[{"q":"Tell me about a communications campaign you led that had measurable organizational impact.","g":"Lead with the outcome — awareness lift, behavior change, narrative shift, crisis resolved — then strategy, then execution. Be specific about the metrics you tracked and how you defined success before launch."},{"q":"Describe how you managed communications across a major organizational change — a merger, restructuring, or leadership transition.","g":"Show your approach: stakeholder mapping, message sequencing, channel selection, two-way feedback mechanisms, and how you handled unexpected reactions."},{"q":"Tell me about a time you had to push back on leadership about a communications decision. What happened?","g":"Walk through your reasoning, how you framed the concern, what alternative you proposed, and what the outcome was."},{"q":"Give me an example of a time your communications plan did not work as expected. What did you learn?","g":"Diagnose what failed: wrong message, wrong channel, wrong timing, wrong tone, wrong audience segmentation. Show you measured and adjusted."}],"technical":[{"q":"How do you develop a stakeholder communications map for a complex initiative?","g":"Cover: identify all affected audiences, assess current awareness and attitude, determine what they need to know feel and do, sequence communications by relationship priority, select appropriate channels, and build in feedback loops."},{"q":"Walk me through how you would develop key messages for an organizational announcement.","g":"Start with the audience primary concern, not the organization talking point. Build messages addressing what this means for them, why it is happening, what comes next, and where to get more information. Prepare Q and A addressing the hardest anticipated questions."},{"q":"What is your approach to measuring internal communications effectiveness?","g":"Cover: readership and open rates, intranet engagement metrics, survey-based awareness and sentiment tracking, manager cascade feedback, and behavioral outcomes such as adoption of new processes or attendance at events."},{"q":"How do you ensure message consistency when multiple spokespeople or teams are communicating externally?","g":"Systems approach: governance process for external communications approval, messaging house document, spokesperson training, rapid response protocol, monitoring for off-message statements, and a feedback loop for flagging inconsistencies."}],"ask":[{"q":"How does communications function here — is it a strategic advisory role to leadership or primarily execution-focused?","g":"Strategic advisory means you are in the room when decisions are made. Execution-focused means you implement decisions others make. Both are legitimate but very different in impact potential."},{"q":"What is the relationship between communications, PR, marketing, and government affairs — integrated or siloed?","g":"Integrated communications teams produce consistent, amplified messages. Siloed teams create contradictions and redundant work."},{"q":"How does the organization handle communications during a crisis or reputational challenge?","g":"A good answer includes a crisis communications plan, defined spokespersons, media training for leadership, and regular exercises."},{"q":"What are the biggest communications challenges the organization is navigating right now?","g":"Shows strategic curiosity and reveals what you would actually be working on."}],"checklist":["Prepare a communications campaign case study with objective, strategy, execution, and outcome metrics","Research recent news about the organization and prepare observations about their current communications approach","Prepare a stakeholder mapping exercise for a hypothetical organizational change — show your framework","Review your crisis communications experience and have a specific story ready","Prepare your answer to what does good internal communications look like with a specific, not generic, answer","Research the organization leadership and understand their public voice and communication style"],"redflags":["Measuring communications only by outputs — pieces published, emails sent — without outcomes","No examples of advising or pushing back on leadership — shows you execute rather than counsel","Vague answers about stakeholder management without a structured mapping approach","No crisis communications experience or framework — all communications professionals should be prepared"]},
"Hospitality Manager":{"behavioral":[{"q":"Tell me about a time a guest experience went wrong and you had to recover it. What did you do?","g":"Show empathy first, then ownership without excuses, then a resolution that exceeded the original expectation. Walk through the actions, the guest response, and any operational change to prevent recurrence."},{"q":"Describe how you have motivated a service team during a high-volume period.","g":"Show you prepared the team in advance with clear expectations and role clarity, stayed visible during service, recognized contributions in real time, and debriefed afterward."},{"q":"Tell me about a time you had to manage a difficult employee situation in a service environment.","g":"Show you addressed performance issues directly but with empathy, documented properly, followed HR process, and maintained team morale through the situation."},{"q":"Give me an example of how you have controlled costs without compromising guest experience.","g":"Show specific levers: labor scheduling optimization, waste reduction, vendor negotiation, menu engineering, upselling — and how you ensured the guest experience held through those changes."}],"technical":[{"q":"Walk me through how you would build and manage a labor schedule for a 200-room hotel on a busy weekend.","g":"Cover: forecasted occupancy times staffing ratio by department, minimum staffing floors for safety and service standards, split shifts vs. full shifts based on demand curve, factoring overtime limits and scheduling laws."},{"q":"How do you approach revenue management — what levers do you use to optimize occupancy and ADR?","g":"Cover: dynamic pricing based on demand, rate parity across OTAs vs. direct, managing channel mix to reduce OTA commission cost, last-minute availability decisions, and reading your competitive set positioning."},{"q":"What does a food safety compliance program look like in a food service operation you have managed?","g":"Cover: HACCP principles, food temperature monitoring logs, allergen management, safe food handling training and certification, cleaning and sanitizing schedules, regular internal audits, and how you respond to health department inspections."},{"q":"How do you handle online reviews — positive and negative — as part of your reputation management strategy?","g":"Respond to every review: positive with genuine thanks, negative with empathy and offline resolution invitation. Track sentiment trends over time. Use negative feedback to identify operational patterns."}],"ask":[{"q":"What does the management team philosophy look like on empowering front-line staff to resolve guest issues?","g":"Service recovery is only as fast as the authority front-line staff have. Empowered employees produce better guest outcomes than those requiring manager approval for every gesture."},{"q":"What is the current guest satisfaction score, and what areas is the team actively working to improve?","g":"Their willingness to share the real score and name specific improvement areas tells you about data transparency and continuous improvement culture."},{"q":"How does the property handle seasonal staffing — what is the strategy for maintaining culture during ramp-up and ramp-down?","g":"Understanding their approach tells you about training investment, culture continuity, and operational maturity."},{"q":"What is the current RevPAR trend compared to competitive set, and what is driving it?","g":"Shows you think like a GM, not just an ops manager. Understanding the trend tells you what strategic challenge you would be navigating."}],"checklist":["Review the property TripAdvisor, Google, and Booking.com reviews and be ready to comment on patterns","Prepare a service recovery story with specific guest outcome and operational change that followed","Refresh basic revenue management concepts: ADR, RevPAR, occupancy, channel mix","Prepare your labor scheduling philosophy — how do you build a schedule that balances cost and service?","Research the property current competitive set and positioning in the market","Prepare your answer to what does exceptional guest experience mean to you with a specific, not generic, answer"],"redflags":["Describing guest complaints as unreasonable without showing empathy first — in hospitality the guest is always heard","Vague answers about cost control without specific operational levers you have actually used","No examples of developing or motivating front-line staff — leadership in hospitality is people-intensive","Inability to discuss basic P&L or revenue management concepts — operations and finance are inseparable"]},
"Event Planner":{"behavioral":[{"q":"Walk me through your most complex event from concept through execution. What made it difficult?","g":"Show the full scope: client intake, concept development, venue selection, vendor coordination, logistics, timeline management, day-of execution, and post-event evaluation. Highlight what required the most judgment."},{"q":"Tell me about a time something went significantly wrong at an event. How did you handle it?","g":"Show you stayed calm, assessed quickly, prioritized the guest experience, made a decision with the information available, and communicated appropriately. What operational change followed?"},{"q":"Describe how you manage multiple events simultaneously at different stages of planning.","g":"Show your organizational system: project management tools, timeline templates, vendor relationship tracking, client communication cadence. Explain how you triage when two events compete for your attention."},{"q":"Give me an example of a time you had to significantly renegotiate or change vendor arrangements under pressure.","g":"Show negotiation skill, relationship management, how you protected the client interest, and how you communicated the change."}],"technical":[{"q":"How do you build an event budget, and how do you manage overruns during execution?","g":"Cover: needs assessment and line item estimation, contingency buffer typically 10 to 15 percent, client approval process for budget changes, tracking actuals in real time, and how you communicate overruns when they happen."},{"q":"Walk me through your vendor RFP and selection process for a new vendor category.","g":"Cover: defining requirements and evaluation criteria, issuing a structured RFP, comparing proposals consistently, checking references, contract negotiation covering payment terms, cancellation clauses, and force majeure, and backup vendor identification."},{"q":"How do you create and manage a day-of timeline for a large event with multiple concurrent elements?","g":"Master timeline structure: by hour then by 15-minute increments for critical moments, separate tracks for each vendor or team, clear owner for each item, buffer time built in. Distribute to all vendors in advance and do a timeline walk-through call."},{"q":"How do you measure event success beyond attendance numbers?","g":"Cover: attendee satisfaction surveys, goal achievement vs. defined objectives, sponsor ROI, media coverage if applicable, and what you would do differently. Success is defined before the event, not explained after."}],"ask":[{"q":"What does the event portfolio look like here — what types, sizes, and complexity levels are most common?","g":"Reveals what your day-to-day reality is. Corporate conferences, galas, product launches, and weddings require different skill sets and create different working rhythms."},{"q":"How does the team handle vendor relationship management — preferred vendor lists or open sourcing?","g":"Preferred lists streamline planning and improve reliability; open sourcing allows more creativity but increases evaluation burden."},{"q":"What technology and project management tools does the team use for event planning?","g":"Whether they use Cvent, Bizzabo, Asana, or spreadsheets tells you about operational sophistication."},{"q":"What is the post-event evaluation process — do events get a formal debrief?","g":"Teams that debrief systematically improve faster. Formal analysis: what worked, what did not, vendor performance ratings, client feedback review, timeline accuracy."}],"checklist":["Prepare a detailed walkthrough of your most complex event — have vendor count, guest count, and budget range ready","Research the company event portfolio and typical client profile before the interview","Prepare your on-the-spot crisis response — you may be given a what would you do if scenario","Review your vendor management approach: how you negotiate contracts and handle performance issues","Prepare your project management system explanation — what tools do you use and why?","Have a question about their biggest upcoming event or current planning challenge — shows genuine interest"],"redflags":["Inability to describe a structured event timeline process — improv without systems creates chaos at scale","No examples of vendor negotiation or contract management — these are core competencies","Describing event success only by whether it went smoothly without objective metrics","No crisis story — experienced event planners have all faced something going wrong"]},
"Chef / Culinary Professional":{"behavioral":[{"q":"Walk me through how you develop a new dish or menu item from concept to plate.","g":"Show your full creative and technical process: inspiration source, flavor profile and balance, technique selection, ingredient sourcing and seasonality, prototype development, internal tasting and iteration, costing, plating development, and training your team to execute consistently."},{"q":"Tell me about a time service broke down under pressure. How did you manage the kitchen?","g":"Show you assessed quickly, communicated clearly to your team, made triage decisions on what to hold or 86, maintained composure, and debriefed afterward to prevent recurrence."},{"q":"Describe how you have managed food cost when ingredient prices spiked unexpectedly.","g":"Show specific levers: menu engineering, alternative sourcing, adjusting portion specs, building new dishes around high-waste trim, pricing adjustments. Show you can protect profitability without compromising quality."},{"q":"Tell me about a time you had to develop and train a cook on a skill they were struggling with. What was your approach?","g":"Show you diagnosed the gap, demonstrated the skill clearly, gave structured practice opportunities, provided honest feedback, and measured improvement."}],"technical":[{"q":"Walk me through your HACCP understanding and how you implement food safety in a daily kitchen operation.","g":"HACCP: Hazard Analysis Critical Control Points. Cover: identifying biological, chemical, and physical hazards, establishing critical control points primarily around temperature, setting critical limits, monitoring procedures, corrective actions, verification through temperature logs and calibration records, and documentation."},{"q":"How do you approach recipe standardization and what does a standardized recipe include?","g":"Standardized recipe elements: precise ingredient weights, preparation instructions step by step, cooking time and temperature, yield and portion size, presentation instructions, food cost per portion, and allergen information."},{"q":"How do you manage inventory and order to minimize waste while avoiding stockouts?","g":"Cover: par level setting based on historical usage, daily inventory of perishables, FIFO rotation, ordering frequency calibrated to shelf life and delivery schedule, tracking waste by category, and using trim and by-products creatively in staff meal or secondary dishes."},{"q":"Walk me through how you would calculate food cost percentage for a new menu item.","g":"Food cost percentage equals ingredient cost divided by selling price times 100. Build it from: weigh every ingredient, cost each at your current purchase price yield-adjusted for waste, total the plate cost, set a target food cost percentage, back-calculate the minimum selling price, and compare to market price tolerance."}],"ask":[{"q":"What is the current food cost target, and how is it tracked and reviewed?","g":"Reveals financial discipline and whether culinary decisions are made with P&L awareness. Weekly food cost tracking and variance review is a sign of a well-managed kitchen."},{"q":"How does the kitchen handle menu development — how much creative input do line cooks and sous chefs have?","g":"Reveals kitchen culture and whether there is room for your creativity or whether menus come from ownership only."},{"q":"What does the training and onboarding process look like for new kitchen staff?","g":"Structured onboarding with station training guides, recipe books, and skill certifications produces faster, more consistent cooks."},{"q":"What is the current team structure and what are the biggest operational challenges right now?","g":"Understanding staffing depth and current pain points tells you what you would actually be managing and where you would make the most immediate impact."}],"checklist":["Prepare your signature dish walkthrough: inspiration, technique, flavor development, and cost","Review HACCP principles and be ready to walk through your daily food safety implementation","Calculate food cost percentage for a few sample dishes before the interview — show financial fluency","Research the restaurant or operation concept, current menu, and reputation online","Prepare your kitchen management philosophy: how do you build and maintain culture under pressure?","Have a clear answer for what would you change about our current menu — usually expected and appreciated"],"redflags":["Inability to discuss food cost management — culinary creativity without financial discipline is unsustainable","No examples of training or developing cooks — great chefs are also great teachers","Describing a volatile temper or aggressive management style as normal kitchen culture","Vague answers about food safety protocols — kitchens have real legal and health liability"]},
"Nonprofit Program Manager":{"behavioral":[{"q":"Tell me about a program you managed that achieved measurable impact. How did you define and track success?","g":"Lead with the outcome — people served, behavior changed, system improved — then explain the program logic model: activities, outputs, and outcomes. Quantify wherever possible. Funders want programs that demonstrate impact, not just activities."},{"q":"Describe a time you had to manage a program with significantly less funding than planned. What did you do?","g":"Show how you triaged: what you maintained, what you cut, what you found creatively through in-kind support, volunteers, or partnerships. Show you can protect program quality under financial pressure."},{"q":"Tell me about a time you had to build trust with a community that was initially skeptical of your organization.","g":"Show patience, cultural humility, willingness to listen before acting, and how you adapted your approach based on what you learned."},{"q":"Give me an example of a grant you wrote or significantly contributed to. What was the outcome?","g":"Walk through the research, the narrative arc you built, how you quantified impact projections, and the result. Grant writing is a core PM skill in most nonprofits."}],"technical":[{"q":"How do you build and manage a program budget from start to finish?","g":"Cover: needs assessment, line item estimation, building in overhead and indirect costs, funder-specific restrictions, tracking actuals vs. budget monthly, managing variances, and final reporting."},{"q":"How do you design a program evaluation plan?","g":"Cover: defining outputs, outcomes, and impact. Choose measurement methods: surveys, pre and post assessments, administrative data, focus groups. Establish a data collection cadence and who owns it. Build evaluation in at design, not after the fact."},{"q":"Walk me through how you manage relationships with multiple funders simultaneously.","g":"Show a systematic approach: track reporting deadlines in a calendar, maintain funder-specific documentation, provide proactive updates beyond required reports, build relationships beyond the grant cycle."},{"q":"How do you engage and manage volunteers effectively in a program setting?","g":"Cover: clear role definition, structured onboarding, task matching to skills and interests, regular communication, recognition, and retention. Treat volunteer management as seriously as staff management."}],"ask":[{"q":"How does the organization measure programmatic impact, and how does that feed into strategic decisions?","g":"Reveals whether evaluation is taken seriously or just done for funders. Organizations that use data to improve programs are more effective and more sustainable."},{"q":"What does the funding mix look like — what percentage is government, foundation, individual, and earned revenue?","g":"Heavy reliance on any single funder is vulnerability. A diversified funding mix suggests organizational maturity."},{"q":"How does leadership engage program staff in strategic planning?","g":"Shows whether this is a top-down organization or one that values frontline knowledge in decision-making."},{"q":"What are the biggest challenges this program area is facing right now?","g":"Reveals what you would actually be navigating — funding gaps, policy changes, capacity constraints, community trust issues."}],"checklist":["Prepare a program you are proud of with a clear logic model: inputs, activities, outputs, outcomes","Research the organization mission, key programs, and most recent annual report or impact report","Prepare a funding challenge story — a time you had to do more with less and what you protected","Review your grant writing experience and be ready to describe your strongest proposal","Prepare your answer to how do you measure impact with specific metrics and methods you have used","Research the organization major funders and programmatic focus areas — show genuine mission alignment"],"redflags":["Describing impact in activity outputs only — number of events held — without participant outcomes","Inability to connect program design to measurable change — this is the core of program management","No experience with budgets, grant reporting, or evaluation — these are table stakes in most roles","Generic passion for the mission without knowledge of the specific community or issue area"]},
"Government / Public Service":{"behavioral":[{"q":"Tell me about a time you had to navigate bureaucratic processes to get something important done. How did you handle it?","g":"Show you understand how decisions move through systems, how you built coalitions, who you needed to bring along, and how you maintained momentum without shortcuts."},{"q":"Describe a situation where you had to balance competing stakeholder interests on a policy or program issue.","g":"Show you identified all stakeholders, understood their core interests not just positions, looked for common ground, and made a decision you could defend on the merits."},{"q":"Tell me about a time you communicated a difficult government decision to constituents or the public.","g":"Show you communicated clearly and honestly, anticipated concerns, used plain language, and maintained respect for the people affected even if they disagreed."},{"q":"Give me an example of a time you improved an inefficient government process. What was the resistance and how did you overcome it?","g":"Show you built a case with data, identified allies, addressed concerns honestly, piloted small before scaling, and documented results."}],"technical":[{"q":"Walk me through how you analyze a policy proposal before making a recommendation.","g":"Cover: problem definition and scope, stakeholder mapping, legal and regulatory authority, budget implications, equity analysis, implementation feasibility, and precedent review."},{"q":"How do you manage a public records request or FOIA response?","g":"Show systematic process: log the request, identify the scope, coordinate with legal counsel on exemptions, retrieve responsive records, apply applicable redactions, meet statutory deadlines, and document the process."},{"q":"What is your experience with government budgeting processes — appropriations, allocations, and expenditure tracking?","g":"Show familiarity with budget cycles and constraints such as fiscal years, line-item restrictions, and carry-forward rules. Show how you tracked expenditures against appropriations."},{"q":"How do you ensure compliance with relevant laws, regulations, and ethics requirements in your daily work?","g":"Show this is embedded in your practice, not a checklist. Mention specific statutes or ethics rules relevant to your role and how you handle gray areas."}],"ask":[{"q":"What does professional development look like for staff here — are there opportunities to grow within the agency?","g":"Government agencies vary widely in career investment. Understanding growth pathways upfront helps you assess long-term potential."},{"q":"How does leadership communicate priorities and handle policy shifts from elected officials or appointees?","g":"You want to understand how the agency maintains mission continuity through leadership transitions and how career staff navigate political direction they may disagree with."},{"q":"What does inter-agency collaboration look like — how often does this role work across departments or jurisdictions?","g":"Reveals the scope and complexity of the work and where turf issues arise. Understanding the culture around collaboration tells you a lot."},{"q":"What are the biggest challenges facing this program or department right now?","g":"Shows you are thinking about real work. Their honest answer gives you context on what you would be navigating."}],"checklist":["Research the agency mission, key programs, and recent policy priorities before the interview","Prepare a story about working within complex processes to achieve a real outcome","Know the relevant legislation or regulatory framework for this agency work at a high level","Prepare your answer to why public service with a genuine and specific answer","Review your strongest example of managing multiple competing stakeholder interests","Prepare thoughtful questions about current policy challenges that show you have done homework"],"redflags":["Expressing frustration with government bureaucracy without showing ability to work within it","Lack of knowledge about the specific agency mission or current priorities — do the homework","No examples of cross-functional or cross-agency collaboration — public service is inherently collaborative","Generic I want to give back answers without specific policy knowledge or community connection"]},
"Social Worker":{"behavioral":[{"q":"Tell me about one of the most challenging cases you have worked. What made it difficult and how did you navigate it?","g":"Maintain confidentiality while being specific enough to be credible. Show clinical judgment, persistence, ethical decision-making, and self-awareness."},{"q":"Describe how you have handled a situation where you had to make a mandatory report that was difficult or uncertain. How did you decide?","g":"Show your assessment process, how you consulted with a supervisor when uncertain, how you communicated with the client, and how you managed the relationship afterward."},{"q":"Tell me about a time you advocated for a client within a system that was difficult to navigate.","g":"Show persistence, creativity, and respect for client self-determination throughout. Describe the barrier, your strategy, and the outcome."},{"q":"Give me an example of how you have practiced cultural humility in your work with a client from a different background.","g":"Show you approached the client experience with curiosity and openness, questioned your own assumptions, sought consultation when needed, and adapted your practice."}],"technical":[{"q":"Walk me through your biopsychosocial assessment process.","g":"Cover biological factors, psychological factors, and social factors. Show you use this to inform a person-centered treatment or service plan, not just to fill out a form."},{"q":"How do you conduct a risk assessment for a client who may be a danger to themselves or others?","g":"Cover key domains: ideation, plan and means access, protective factors, history of attempts, and current precipitants. Document thoroughly. Know when to consult, involve law enforcement, or pursue hospitalization."},{"q":"How do you maintain professional boundaries while building genuine therapeutic rapport?","g":"Show that clear, consistent boundaries actually enable trust. Explain how you establish them early, how you handle clients who test them, and how you use supervision to reflect on boundary-adjacent situations."},{"q":"What trauma-informed practices do you incorporate into your work?","g":"Cover the core TIC principles: safety, trustworthiness, peer support, collaboration, empowerment, and cultural humility. Give specific examples from your practice."}],"ask":[{"q":"What does supervision look like here — frequency, format, and is it clinical or primarily administrative?","g":"Clinical supervision is essential for professional and ethical practice. Get specifics — frequency, individual vs. group format, and supervisor credentials matter for your development."},{"q":"What is the caseload size, and how does the organization manage worker capacity?","g":"Caseload size directly affects quality of care and burnout rate. An honest answer to this tells you how the organization values its clinical staff."},{"q":"How does the organization support staff after difficult critical incidents — client deaths, violence, or acute crises?","g":"Organizations that debrief, provide EAP access, and normalize emotional support retain workers longer and produce better outcomes."},{"q":"What opportunities exist for professional development, licensure supervision hours, and continuing education?","g":"If you are working toward LCSW or other licensure, supervised hours are non-negotiable. Get clarity on what the organization provides."}],"checklist":["Prepare a case summary demonstrating your assessment and intervention process — maintain confidentiality","Research the organization population, programs, and theoretical orientation","Prepare your answer to how do you practice self-care seriously — burnout in social work is real and interviewers know it","Review mandated reporting laws for the relevant population and jurisdiction","Prepare your answer to a boundary scenario — you will likely be given a case vignette","Know your licensure status and hours clearly — be ready to discuss your supervision needs honestly"],"redflags":["Inability to describe a structured clinical assessment process — empathy alone is not a practice framework","Vague answers about self-care without specific sustainable practices — shows potential burnout risk","No discussion of supervision or consultation as a regular practice — strong practitioners use supervision","Savior framing in how you talk about clients — social work is about empowerment, not rescue"]}
,
"Accountant / CPA":{"behavioral":[{"q":"Tell me about a time you caught a material error in a financial statement before it was reported. What did you do?","g":"Walk through how you found it, the potential impact if it had gone undetected, how you communicated it up, and what process change resulted."},{"q":"Describe how you managed a month-end or year-end close under a tight deadline.","g":"Show your planning process: what you prepared in advance, how you sequenced tasks, how you coordinated with others, and how you handled surprises."},{"q":"Give me an example of a time you had to explain a complex accounting issue to a non-accountant.","g":"Show how you identified what the person needed to understand, what framing or analogy you used, and whether the decision they made was better as a result."},{"q":"Tell me about a time you identified a process improvement in your close or reporting workflow.","g":"Describe the inefficiency, the solution you proposed or implemented, and the measurable improvement — time saved, error rate reduced."}],"technical":[{"q":"Walk me through the revenue recognition criteria under ASC 606.","g":"Five-step model: identify the contract, identify performance obligations, determine transaction price, allocate price to obligations, recognize revenue as obligations are satisfied. Be ready to apply it to SaaS subscriptions, bundled products, or variable consideration."},{"q":"What is the difference between cash and accrual accounting? When does it matter?","g":"Cash: recognize when cash changes hands. Accrual: recognize when earned or incurred regardless of cash. Accrual better reflects economic reality and is required for GAAP. It matters most when timing gaps exist between delivery and payment."},{"q":"How do you approach a bank reconciliation when there are unexplained variances?","g":"Start with known timing differences — outstanding checks, deposits in transit — then investigate item by item. Look for transposition errors, duplicate entries, bank fees, NSF items. Document every variance."},{"q":"What are deferred revenue and deferred expenses? Give an example of each.","g":"Deferred revenue: cash received before earning it — annual SaaS subscription recognized monthly. Deferred expense or prepaid: expense paid before the period it benefits — annual insurance premium expensed monthly."}],"ask":[{"q":"What accounting standards or recent changes is the team currently navigating?","g":"Shows you are current with the profession. New lease accounting, crypto guidance, and ESG reporting are live issues."},{"q":"How does the accounting team interact with business partners — embedded or centralized?","g":"Embedded teams have more strategic access; centralized teams are more process-focused."},{"q":"What does the audit relationship look like — internal and external?","g":"Understanding the audit cadence, external auditor relationship, and internal audit resourcing tells you about financial governance maturity."},{"q":"What is the biggest accounting or reporting challenge the team is facing this year?","g":"Reveals real complexity and where you would contribute."}],"checklist":["Review the three financial statements and how they connect — walk through from scratch","Refresh ASC 606 revenue recognition and be ready to apply it to a scenario","Prepare your strongest close or reporting story with specific timeline and outcome details","Research the company industry for relevant accounting considerations — leases, inventory, revenue type","Review journal entry mechanics: depreciation, accruals, deferred revenue","Prepare your answer to what accounting software or ERP you have used with specific workflow examples"],"redflags":["Inability to explain the difference between assets and expenses or revenue and cash","Vague answers about attention to detail without a specific story showing how you catch errors","No examples of process improvement — shows you execute but do not improve the system","Treating compliance as the ceiling — the best accountants add strategic value"]},
"Sales Representative":{"behavioral":[{"q":"Walk me through your most successful sale. What made it work?","g":"Lead with the outcome — deal size, quota percentage, competitive dynamics — then explain your process: prospecting, relationship-building, objection handling, and close. Show it was repeatable methodology, not luck."},{"q":"Tell me about a deal you lost. What happened and what did you learn?","g":"Walk through the loss honestly — misjudged stakeholders, lost on price, got outsold. What changed in your approach afterward? Show you extract learning rather than just moving on."},{"q":"Describe how you manage your pipeline when you have more opportunities than time.","g":"Explain your prioritization criteria: deal size, stage, close probability, strategic fit. Show you actively cull long-shot deals. Mention CRM practices or frameworks you use."},{"q":"Give me an example of a time you turned a skeptical prospect into a paying customer.","g":"Show you diagnosed the skepticism, adapted your approach, and found the specific angle that moved them. Show you listened and pivoted rather than just persisting."}],"technical":[{"q":"Walk me through your sales process from first contact to close.","g":"Show a repeatable methodology: prospecting, qualifying using BANT or MEDDIC, discovery or needs analysis, presentation or demo, objection handling, negotiation, and close. Be specific about what you do at each stage and why."},{"q":"How do you approach a cold call or cold email to a prospect you have never spoken with?","g":"Show a research-first mindset: you know something about their business before reaching out. Your opening should be about them, not you."},{"q":"How do you handle the objection that your price is too high?","g":"Do not immediately discount. First ask: too high compared to what? Is it a budget issue or a value issue? Reframe value — what does it cost them not to solve this problem?"},{"q":"How do you manage a deal that has stalled? What does your re-engagement process look like?","g":"Show proactive value-added re-engagement: share a relevant case study, reference a trigger event, offer a workshop. Do not just check in — give them a reason to re-engage."}],"ask":[{"q":"What does a typical ramp period look like, and what are the metrics that define success in the first 90 days?","g":"Clarity on ramp expectations protects you from being held to full quota before you have the tools and relationships to hit it."},{"q":"What is the ratio of inbound to outbound leads, and how does marketing support the sales team?","g":"Reveals what your actual day will look like and the quality of marketing-sales alignment."},{"q":"Can you tell me about your top performer and what they do differently from the rest of the team?","g":"Gets an honest picture of what success looks like in practice rather than on paper."},{"q":"What is the product roadmap looking like — are there new features that would change the sales motion?","g":"Shows product curiosity and whether the company is investing in making the product easier to sell."}],"checklist":["Prepare your pipeline and quota attainment numbers — know your metrics cold before walking in","Research the company product deeply: pricing model, ICP, competitive differentiation, recent wins","Prepare your answer to sell me this product — you may be asked to pitch on the spot","Practice your objection handling for price, timing, and competitor comparisons","Prepare a specific re-engagement story: a deal that stalled and how you revived it","Research the company competitors and be able to position against them credibly"],"redflags":["Being unable to state your quota attainment percentage — every sales candidate should know this cold","Describing your process as building relationships without methodology or measurable outcomes","Claiming you have never lost a deal or had a stall — shows lack of self-awareness","No curiosity about the product, ICP, or competitive landscape"]},

tuation where a customer wants a feature that is not on the roadmap?","g":"Acknowledge their need, validate it, document it with specifics, share transparently what you can and cannot commit to, and keep them informed as the roadmap evolves."}],"ask":[{"q":"What does the handoff from sales to customer success look like here? What information do you typically receive?","g":"Poor handoffs drive early churn. You want to know what context you will have on why the customer bought, what they were promised, and what success looks like to them."},{"q":"What is the current net revenue retention rate, and what are the biggest drivers of churn?","g":"NRR is the health metric for CSM organizations. Their willingness to share it and analyze it honestly tells you about data culture."},{"q":"How are CSMs measured here — is it primarily retention, expansion, or both?","g":"Reveals where incentives are and what you will be accountable for."},{"q":"What does the CSM to customer ratio look like, and how is it expected to change?","g":"Ratio determines how much strategic work you can actually do vs. reactive support."}],"checklist":["Prepare your churn save story with specific warning signs, actions taken, and outcome metrics","Research the company product — sign up for a trial or demo if possible before the interview","Prepare your onboarding methodology — have a framework ready to walk through","Know your book of business metrics: average contract value, retention rate, expansion rate","Prepare your answer to how do you prioritize your accounts with a clear, defensible framework","Research published customer case studies or reviews on G2 or Capterra to understand real user pain points"],"redflags":["Describing customer success as just building relationships without accountability to metrics","No examples of proactive churn prevention — purely reactive support does not qualify as CSM","Vague answers about customer health without defining what signals you actually track","Being unable igns, content already performing organically, and bottom-of-funnel conversion."}],"ask":[{"q":"What are the primary business goals social media is expected to support here?","g":"Reveals whether social is seen as strategic or just a content calendar."},{"q":"How much creative autonomy does the social team have — what is the approval process for content?","g":"Approval-heavy processes kill timing and authenticity. Understand how fast you can move."},{"q":"What social channels are currently active, and are there any the team has been considering but has not launched?","g":"Reveals current state and where there is room to expand and own something new."},{"q":"How does the social team collaborate with content, PR, and demand gen?","g":"Cross-functional alignment determines whether you are amplifying a coherent brand voice or publishing in isolation."}],"checklist":["Audit the company current social presence before the interview — note what is working and what is missing","Prepare 2 to 3 specific campaign examples with engagement rates and outcomes memorized","Have a content idea ready for their brand that you could pitch on the spot","Review their competitors social strategy and be ready to compare","Prepare your answer to what platform do you think is most underutilized by brands like ours thoughtfully","Review your strongest engagement rate posts and know exactly why they worked"],"redflags":["Measuring success primarily in followers or impressions without connecting to business outcomes","No examples of responding to negative comments or a difficult community moment","Being unable to explain how a platform algorithm works","Purely reactive calendar-filling approach without a strategic framework or brand voice understanding"]},
"Graphic Designer":{"behavioral":[{"q":"Tell me about a project where you had to balance strong creative vision with significant stakeholder constraints.","g":"Show you can hold a creative point of view while remaining responsive to real-world constraints. The best designers solve problems within constraints — they do not just resist them."},{"q":"Describe a time when you received critical feedback on your work that you disagreed with. How did you handle it?","g":"Show you can separate ego from work, listen actively, ask clarifying questions to understand the underlying concern, and either adjust with good reasoning or advocate with evidence from design principles."},{"q":"Tell me about a project that did not go the way you planned. What happened?","g":"Show maturity: what you communicated, what you adapted, and what you learned. The ability to course-correct without drama is a professional competency."},{"q":"Give me an example of a time you had to produce high-quality work under an unusually tight deadline.","g":"Show how you triaged: what you prioritized, what you simplified, how you communicated constraints, and how the work held up."}],"technical":[{"q":"Walk me through how you approach a brand identity project from brief to delivery.","g":"Cover: brief analysis, competitive and audience research, moodboarding, logo concept exploration, refinement rounds, type and color system, brand guidelines documentation. Identity design is a system, not a logo."},{"q":"How do you approach typography selection for a project? What factors guide your choices?","g":"Cover: brand personality alignment, legibility at relevant sizes, pairing logic for display and body, licensing for commercial use, and web font performance."},{"q":"What is your process for designing something that needs to work across print and digital formats?","g":"Show understanding of RGB vs. CMYK, resolution requirements, bleed and safe zones for print, and variable screen sizes for digital."},{"q":"How do you ensure visual consistency across a large multi-piece project?","g":"Systems thinking: build a style guide or component library upfront, use shared libraries in Figma or linked assets in Adobe, establish naming conventions, conduct visual QA passes before delivery."}],"ask":[{"q":"What does the design review and feedback process look like here?","g":"Structured critique with clear decision-makers is healthier than everyone weighing in on aesthetics. Understand who has final say."},{"q":"How does the design team collaborate with marketing, product, and other functions?","g":"Early involvement in briefs and strategy sessions is a sign of design maturity."},{"q":"What does the tool stack look like — what software does the team use and is there flexibility?","g":"Whether they use modern collaborative tools or legacy workflows affects your day-to-day significantly."},{"q":"Is there a design system or brand guidelines document in place, and how actively is it maintained?","g":"A mature design team has living systems, not static documents."}],"checklist":["Curate your portfolio to show range: branding, print, digital, and process work — not just final visuals","Be ready to walk through your strongest project in 3 minutes with design decision rationale at each step","Review the company current visual identity — note what is working and where there is inconsistency","Prepare your answer to what is your design process with a specific, structured answer","Review typography and color theory fundamentals — you may be asked to critique work on the spot","Prepare your answer to what designers or brands inspire you and why with specific, substantive reasons"],"redflags":["A portfolio with only final polished work and no process — interviewers need to see how you think","Being unable to explain why you made specific design decisions","Showing defensiveness when work is critiqued — design critique is daily practice","Claiming expertise in tools you have not used recently"]},

// Company type framing
function getCompanyNote(company) {
  if (!company) return null;
  const c = company.toLowerCase();
  if (c.includes('startup') || c.includes('early stage') || c.includes('seed') || c.includes('series a') || c.includes('series b'))
    return "Startups prize ownership, adaptability, and comfort with ambiguity. Emphasize examples where you wore multiple hats, moved fast, and drove results without full resources or clear direction.";
  if (c.includes('big tech') || c.includes('faang') || c.includes('google') || c.includes('meta') || c.includes('amazon') || c.includes('microsoft') || c.includes('apple'))
    return "Large tech companies have structured interviews with codified frameworks (e.g. Amazon's Leadership Principles). Research their specific values and map your stories to them. Scale and measurable impact matter.";
  if (c.includes('consult') || c.includes('mckinsey') || c.includes('bain') || c.includes('bcg') || c.includes('deloitte') || c.includes('accenture'))
    return "Consulting firms evaluate structured thinking and communication as much as experience. Practice delivering your answers in a clear, top-down format. Show you can simplify complexity for any audience.";
  if (c.includes('hospital') || c.includes('health') || c.includes('clinic') || c.includes('medical'))
    return "Healthcare organizations look for mission alignment, patient-centered values, and evidence of working effectively in high-stakes, team-based environments. Show you understand the regulatory and ethical context.";
  if (c.includes('government') || c.includes('federal') || c.includes('agency') || c.includes('public sector'))
    return "Government roles value process adherence, stakeholder management, and public accountability. Show you understand how decisions get made in bureaucratic environments and that you're motivated by public service, not just stability.";
  if (c.includes('nonprofit') || c.includes('ngo') || c.includes('foundation'))
    return "Nonprofits prioritize mission alignment and resourcefulness. Show genuine connection to the cause and examples of achieving outsized impact with limited resources. Salary flexibility signals may also be relevant.";
  if (c.includes('bank') || c.includes('finance') || c.includes('investment') || c.includes('pe') || c.includes('private equity') || c.includes('hedge'))
    return "Financial services firms emphasize precision, integrity, and commercial awareness. Have specific knowledge of their recent deals, funds, or market activities. Show you understand the business model and can speak fluently about markets.";
  return `Targeting ${company}: research their mission, recent news, and culture values. Prepare examples that align with what they publicly say they care about.`;
}
